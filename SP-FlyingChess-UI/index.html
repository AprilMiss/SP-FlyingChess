<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SP飞行棋 - 温馨路径棋盘版</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="layout">
    <aside id="leftPanel">
      <div class="brand">
        <div class="brandIcon">❤</div>
        <div>
          <h1>SP飞行棋</h1>
          <div class="subTitle">温馨情趣 · 路径棋盘版</div>
        </div>
      </div>

      <section class="panelSection" id="sectionPlayers">
        <button class="sectionHeader" data-target="playersContent">① 玩家设置 <span id="playersStatus">未保存</span></button>
        <div class="sectionContent" id="playersContent">
          <label>玩家数量</label>
          <input id="playerCountInput" type="number" min="1" max="12" value="2" />
          <button id="initPlayersBtn">初始化玩家</button>
          <div id="playersEditor"></div>
          <button class="saveBtn" data-save="players">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionPunish">
        <button class="sectionHeader" data-target="punishContent">② 惩罚词库 <span id="punishStatus">未保存</span></button>
        <div class="sectionContent" id="punishContent">
          <label>工具词库（每行一个）</label>
          <textarea id="toolsInput" rows="5"></textarea>

          <label>姿势词库（每行一个）</label>
          <textarea id="posturesInput" rows="5"></textarea>

          <label>最大次数</label>
          <input id="maxCountInput" type="number" min="1" max="999" value="3" />

          <button class="saveBtn" data-save="punish">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionBody">
        <button class="sectionHeader" data-target="bodyContent">③ 身体部位 <span id="bodyStatus">未保存</span></button>
        <div class="sectionContent" id="bodyContent">
          <div class="hint">启用后进入随机池。百分比按当前启用部位权重实时计算。</div>
          <div id="bodyEditor"></div>

          <div class="miniForm">
            <input id="newBodyNameInput" placeholder="新增部位名称" />
            <button id="addBodyPartBtn">新增</button>
          </div>

          <button class="saveBtn" data-save="body">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionReward">
        <button class="sectionHeader" data-target="rewardContent">④ 奖励词库 <span id="rewardStatus">未保存</span></button>
        <div class="sectionContent" id="rewardContent">
          <label>奖励内容（每行一个）</label>
          <textarea id="rewardInput" rows="6"></textarea>
          <button class="saveBtn" data-save="reward">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionTrap">
        <button class="sectionHeader" data-target="trapContent">⑤ 陷阱词库 <span id="trapStatus">未保存</span></button>
        <div class="sectionContent" id="trapContent">
          <label>陷阱内容（每行一个）</label>
          <textarea id="trapInput" rows="6"></textarea>
          <button class="saveBtn" data-save="trap">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionSpecial">
        <button class="sectionHeader" data-target="specialContent">⑥ 特殊词库 <span id="specialStatus">未保存</span></button>
        <div class="sectionContent" id="specialContent">
          <label>特殊内容（每行一个）</label>
          <textarea id="specialInput" rows="6"></textarea>
          <button class="saveBtn" data-save="special">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionBoard">
        <button class="sectionHeader" data-target="boardContent">⑦ 棋盘生成 <span id="boardStatus">未生成</span></button>
        <div class="sectionContent" id="boardContent">
          <label>总格子数</label>
          <input id="boardSizeInput" type="number" min="5" max="300" value="50" />

          <label>每行格子数（影响蛇形盘绕宽度）</label>
          <input id="boardColumnsInput" type="number" min="5" max="14" value="10" />

          <div class="grid2">
            <div>
              <label>奖励权重</label>
              <input id="rewardWeightInput" type="number" min="0" value="30" />
            </div>
            <div>
              <label>惩罚权重</label>
              <input id="punishWeightInput" type="number" min="0" value="30" />
            </div>
            <div>
              <label>特殊权重</label>
              <input id="specialWeightInput" type="number" min="0" value="20" />
            </div>
            <div>
              <label>陷阱权重</label>
              <input id="trapWeightInput" type="number" min="0" value="20" />
            </div>
          </div>

          <div class="boardButtons">
            <button id="generateBoardBtn">生成棋盘</button>
            <button id="regenerateBoardBtn">重新生成</button>
            <button id="startGameBtn">开始游戏</button>
          </div>

          <button class="saveBtn" data-save="board">保存并收起</button>
        </div>
      </section>

      <section class="panelSection" id="sectionStorage">
        <button class="sectionHeader" data-target="storageContent">配置导入/导出</button>
        <div class="sectionContent" id="storageContent">
          <button id="exportConfigBtn">导出配置 JSON</button>
          <label class="fileLabel">
            导入配置 JSON
            <input id="importConfigInput" type="file" accept="application/json" />
          </label>
          <button id="resetConfigBtn" class="danger">恢复默认配置</button>
        </div>
      </section>
    </aside>

    <main id="rightPanel">
      <div class="topBar">
        <button id="rollDiceBtn">🎲 掷骰子</button>
        <div id="turnInfo">等待开始</div>
      </div>

      <div id="eventPanel">
        <div class="eventTitle">本回合事件</div>
        <div id="eventContent">先完成左侧设置，再生成棋盘。</div>
      </div>

      <div class="legend">
        <span class="legendItem startDot">START</span>
        <span class="legendItem rewardDot">🎁 奖励</span>
        <span class="legendItem punishDot">❗ 惩罚</span>
        <span class="legendItem specialDot">✨ 特殊</span>
        <span class="legendItem trapDot">⚠ 陷阱</span>
        <span class="legendItem goalDot">GOAL</span>
      </div>

      <div id="boardWrap">
        <div id="board"></div>
      </div>

      <div id="logPanel">
        <div class="eventTitle">历史记录</div>
        <div id="logList"></div>
      </div>
    </main>
  </div>

  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/players.js"></script>
  <script src="js/body.js"></script>
  <script src="js/reward.js"></script>
  <script src="js/trap.js"></script>
  <script src="js/special.js"></script>
  <script src="js/punish.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
